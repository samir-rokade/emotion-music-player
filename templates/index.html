<!DOCTYPE html>
<html>
<head>
<title>Emotion Music Player</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: white;
    margin: 0;
    transition: 0.5s;
    background-size: 300% 300%;
    animation: gradientMove 8s ease infinite;
}

/* 🎨 Mood backgrounds */
.happy { background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb); }
.sad { background: linear-gradient(135deg, #2c3e50, #4ca1af, #6dd5ed); }
.angry { background: linear-gradient(135deg, #ff416c, #ff4b2b, #ff0000); }
.relaxed { background: linear-gradient(135deg, #1e1e2f, #2b5876, #4e4376); }
.love { background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb6c1); }
.sleep { background: linear-gradient(135deg, #141e30, #243b55, #2c5364); }
.excited { background: linear-gradient(135deg, #f7971e, #ffd200, #ff8c00); }
.focus { background: linear-gradient(135deg, #11998e, #38ef7d, #00c9ff); }
.chill { background: linear-gradient(135deg, #00c6ff, #0072ff, #6a11cb); }
.workout { background: linear-gradient(135deg, #000000, #434343, #ff512f); }

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEADER */
.header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 12px 20px;
    background: rgba(0,0,0,0.4);
}

/* MENU */
.menu-container {
    justify-self: start;
    position: relative;
}

.menu-btn {
    font-size: 22px;
    cursor: pointer;
    background: none;
    border: none;
    color: white;
}

.dropdown {
    display: none;
    position: absolute;
    left: 0;
    top: 30px;
    background: rgba(0,0,0,0.9);
    border-radius: 10px;
    padding: 10px;
}

.dropdown button {
    display: block;
    width: 150px;
    margin: 5px 0;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
}

/* TITLE */
.logo {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
}

/* RIGHT BUTTONS */
.nav-buttons {
    justify-self: end;
}

.nav-buttons button {
    margin-left: 8px;
    padding: 6px 12px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

/* SEARCH */
#searchInput {
    padding: 12px 16px;
    width: 280px;
    border-radius: 25px;
    border: none;
    margin-top: 10px;
    outline: none;
}

/* BUTTON */
.play-btn {
    padding: 10px 20px;
    margin-top: 8px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    cursor: pointer;
    box-shadow: 0px 3px 10px rgba(0,0,0,0.3);
}

/* MOODS */
.mood-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}

.mood-btn {
    padding: 10px 16px;
    border-radius: 25px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.card {
    width: 280px;
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
}

/* CAMERA */
#cameraSection {
    display: none;
    margin-top: 15px;
}
</style>
</head>

<body class="relaxed">

<!-- HEADER -->
<div class="header">

    <div class="menu-container">
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        <div id="dropdownMenu" class="dropdown">
            <button onclick="aiSuggest()">🤖 AI Suggest</button>
            <button onclick="openCamera()">📷 Scan Mood</button>
        </div>
    </div>

    <div class="logo">Music Player🎧</div>

    <div class="nav-buttons">
        <button onclick="clearResults()">🧹</button>
        <button onclick="randomSearch()">🎲</button>
    </div>

</div>

<h1 style="margin:10px 0 5px;">Mood Based Music Recommendation 🎧</h1>
<h2 id="currentMoodText" style="margin:0;">😌 RELAXED</h2>

<!-- SEARCH -->
<div style="margin-top:10px;">
    <input type="text" id="searchInput" placeholder="Search songs..." onkeypress="handleSearch(event)">
    <br>
    <button class="play-btn" onclick="searchMusic()">🔍 Search</button>
</div>

<!-- MOODS -->
<div class="mood-container">
    <button class="mood-btn" onclick="setMood('happy')">😊 Happy</button>
    <button class="mood-btn" onclick="setMood('sad')">😢 Sad</button>
    <button class="mood-btn" onclick="setMood('angry')">😡 Angry</button>
    <button class="mood-btn" onclick="setMood('relaxed')">😌 Relaxed</button>
    <button class="mood-btn" onclick="setMood('love')">😍 Love</button>
    <button class="mood-btn" onclick="setMood('sleep')">😴 Sleep</button>
    <button class="mood-btn" onclick="setMood('excited')">🤩 Excited</button>
    <button class="mood-btn" onclick="setMood('focus')">📚 Focus</button>
    <button class="mood-btn" onclick="setMood('chill')">😎 Chill</button>
    <button class="mood-btn" onclick="setMood('workout')">💪 Workout</button>
</div>

<button class="play-btn" onclick="loadMusic()">▶ Play Mood Music</button>

<!-- CAMERA -->
<div id="cameraSection">
    <video id="video" width="280" height="180" autoplay style="border-radius:10px;"></video>
    <br>
    <button class="play-btn" onclick="captureMood()">📸 Capture Mood</button>
</div>

<div id="musicContainer" class="cards"></div>

<script>
let currentMood = "relaxed";
let video = document.getElementById("video");

const moodEmojis = {
    happy:"😊", sad:"😢", angry:"😡", relaxed:"😌",
    love:"😍", sleep:"😴", excited:"🤩",
    focus:"📚", chill:"😎", workout:"💪"
};

function toggleMenu() {
    const menu = document.getElementById("dropdownMenu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function setMood(mood) {
    currentMood = mood;
    document.body.className = mood;
    document.getElementById("currentMoodText").innerText =
        moodEmojis[mood] + " " + mood.toUpperCase();
}

function openCamera() {
    document.getElementById("cameraSection").style.display = "block";
    navigator.mediaDevices.getUserMedia({ video: true })
    .then(stream => video.srcObject = stream)
    .catch(() => alert("Camera access denied!"));
}

function captureMood() {
    const moods = ["happy","sad","angry","relaxed","love","excited"];
    const detectedMood = moods[Math.floor(Math.random()*moods.length)];
    alert("Detected Mood: " + moodEmojis[detectedMood] + " " + detectedMood.toUpperCase());
    setMood(detectedMood);
    loadMusic();
}

function searchMusic() {
    const query = document.getElementById("searchInput").value;
    fetch("/search_music?q=" + query).then(r=>r.json()).then(showData);
}

function handleSearch(e){
    if(e.key==="Enter") searchMusic();
}

function loadMusic() {
    fetch("/get_music?mood=" + currentMood).then(r=>r.json()).then(showData);
}

function clearResults() {
    document.getElementById("musicContainer").innerHTML = "";
}

function randomSearch() {
    const list = ["lofi","sad songs","dj remix","romantic songs"];
    const random = list[Math.floor(Math.random()*list.length)];
    document.getElementById("searchInput").value = random;
    searchMusic();
}

function aiSuggest() {
    const moods = ["lofi chill","romantic songs","sad songs","party songs"];
    const random = moods[Math.floor(Math.random()*moods.length)];
    document.getElementById("searchInput").value = random;
    searchMusic();
}

function showData(data) {
    const container = document.getElementById("musicContainer");
    container.innerHTML = "";

    data.forEach(song => {
        const url = `https://www.youtube.com/embed/${song.id}`;
        container.innerHTML += `
        <div class="card">
            <iframe width="100%" height="180" src="${url}" allowfullscreen></iframe>
            <p><b>${song.title}</b></p>
        </div>`;
    });
}
</script>

</body>
</html>
