<!DOCTYPE html>
<html>
<head>
<title>Emotion Music Player | Premium Music Experience</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="relaxed">

<!-- Music Pattern Background -->
<div class="music-pattern"></div>

<!-- Elegant Floating Emojis -->
<div class="floating-emojis">
    <div class="emoji">🎵</div>
    <div class="emoji">🎶</div>
    <div class="emoji">🎧</div>
    <div class="emoji">🎼</div>
    <div class="emoji">🎹</div>
    <div class="emoji">🎸</div>
    <div class="emoji">🎷</div>
    <div class="emoji">🎺</div>
    <div class="emoji">🎻</div>
    <div class="emoji">🥁</div>
    <div class="emoji">🎤</div>
    <div class="emoji">🎵</div>
    <div class="emoji">🎶</div>
    <div class="emoji">🎧</div>
    <div class="emoji">🎼</div>
</div>

<div class="header">
    <div class="menu-container">
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        <div id="dropdownMenu" class="dropdown">
            <button onclick="aiSuggest()">🤖 AI Suggest</button>
            <button onclick="openCamera()">📷 Scan Mood</button>
            <button onclick="mostLiked()">❤️ Most Liked</button>
            <button onclick="latestSongs()">🆕 Latest Songs</button>
        </div>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="header-search" placeholder="Search songs, artists, or moods..." onkeypress="handleSearch(event)">
        <button class="header-search-btn" onclick="searchMusic()">🔍 Search</button>
    </div>

    <div class="nav-buttons">
        <button onclick="goAbout()">ℹ️ About</button>

        <div class="profile-container">
            <button onclick="toggleProfile()">👤 {{ session.user }}</button>
            <div id="profileMenu" class="profile-dropdown">
                <button onclick="window.location.href='/profile'">👤 My Profile</button>
                <button onclick="window.location.href='/history'">🕒 Search History</button>
                <button onclick="window.location.href='/recent'">🎵 Recently Played</button>
                <button onclick="window.location.href='/liked'">❤️ Liked Songs</button>
                <button onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>
</div>

<div class="main-content">
    <h1>🎵 Mood Based Music Recommendation</h1>
    <h2 id="currentMoodText">😌 RELAXED</h2>

    <div class="mood-container">
        <button class="mood-btn" onclick="setMood('happy')">😊 Happy</button>
        <button class="mood-btn" onclick="setMood('sad')">😢 Sad</button>
        <button class="mood-btn" onclick="setMood('angry')">😡 Angry</button>
        <button class="mood-btn" onclick="setMood('relaxed')">😌 Relaxed</button>
        <button class="mood-btn" onclick="setMood('love')">😍 Love</button>
        <button class="mood-btn" onclick="setMood('sleep')">😴 Sleep</button>
        <button class="mood-btn" onclick="setMood('excited')">🤩 Excited</button>
        <button class="mood-btn" onclick="setMood('focus')">📚 Focus</button>
        <button class="mood-btn" onclick="setMood('chill')">😎 Chill</button>
        <button class="mood-btn" onclick="setMood('workout')">💪 Workout</button>
    </div>

    <button class="play-btn" onclick="loadMusic()">▶ Play Mood Music</button>

    <div id="musicContainer" class="cards"></div>
</div>

<!-- Camera Modal -->
<div id="cameraModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeCamera()">&times;</span>
        <h2>📸 Scan Your Mood</h2>
        <video id="video" autoplay playsinline></video>
        <button class="capture-btn" onclick="capturePhoto()">📷 Capture & Detect</button>
        <canvas id="canvas" style="display:none;"></canvas>
        <div id="moodResult" class="mood-result"></div>
    </div>
</div>

<script>
let currentMood = "relaxed";
let currentSongs = [];
let stream = null;

function toggleMenu() {
    let dropdown = document.getElementById("dropdownMenu");
    if (dropdown.style.display === "block") {
        dropdown.style.display = "none";
    } else {
        document.getElementById("profileMenu").style.display = "none";
        dropdown.style.display = "block";
    }
}

function toggleProfile() {
    let profile = document.getElementById("profileMenu");
    if (profile.style.display === "block") {
        profile.style.display = "none";
    } else {
        document.getElementById("dropdownMenu").style.display = "none";
        profile.style.display = "block";
    }
}

function setMood(mood) {
    currentMood = mood;
    document.body.className = mood;
    let moodText = mood.toUpperCase();
    let emoji = {
        happy: '😊', sad: '😢', angry: '😡', relaxed: '😌', love: '😍',
        sleep: '😴', excited: '🤩', focus: '📚', chill: '😎', workout: '💪'
    };
    document.getElementById("currentMoodText").innerHTML = `${emoji[mood]} ${moodText}`;
    
    document.querySelectorAll('.mood-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.innerText.toLowerCase().includes(mood)) {
            btn.classList.add('active');
        }
    });
}

function goAbout() { window.location.href = "/about"; }
function logout() { window.location.href = "/logout"; }

function searchMusic() {
    let q = document.getElementById("searchInput").value.trim();
    if (!q) {
        alert("Please enter a song name to search!");
        return;
    }
    
    showLoading();
    fetch("/search_music?q=" + encodeURIComponent(q))
        .then(r => r.json())
        .then(data => {
            if (data && data.length > 0) {
                currentSongs = data;
                showData(data);
            } else {
                showNoResults();
            }
        })
        .catch(error => {
            console.error("Search error:", error);
            showError();
        });
}

function handleSearch(e) {
    if (e.key === "Enter") searchMusic();
}

function loadMusic() {
    showLoading();
    fetch("/get_music?mood=" + currentMood)
        .then(r => r.json())
        .then(data => {
            if (data && data.length > 0) {
                currentSongs = data;
                showData(data);
            } else {
                showNoResults();
            }
        })
        .catch(error => {
            console.error("Load music error:", error);
            showError();
        });
}

function aiSuggest() {
    let suggestions = [
        "lofi beats", "romantic songs", "sad songs", 
        "party music", "meditation", "workout music",
        "jazz", "classical piano", "rock classics", "pop hits"
    ];
    let randomSuggestion = suggestions[Math.floor(Math.random() * suggestions.length)];
    document.getElementById("searchInput").value = randomSuggestion;
    searchMusic();
}

function mostLiked() {
    document.getElementById("searchInput").value = "top trending songs 2024";
    searchMusic();
}

function latestSongs() {
    document.getElementById("searchInput").value = "new released songs";
    searchMusic();
}

function likeSong(songId, songTitle, thumbnail, btnElement) {
    fetch("/like_song", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: songId, title: songTitle, thumbnail: thumbnail })
    }).then(() => {
        btnElement.innerHTML = "❤️ Liked";
        btnElement.disabled = true;
        btnElement.style.opacity = "0.6";
    }).catch(err => console.error("Like error:", err));
}

function showLoading() {
    let c = document.getElementById("musicContainer");
    c.innerHTML = '<div class="loading">Loading music recommendations</div>';
}

function showNoResults() {
    let c = document.getElementById("musicContainer");
    c.innerHTML = '<div style="text-align:center; padding:50px; font-size:16px;">🎵 No songs found. Try another mood or search!</div>';
}

function showError() {
    let c = document.getElementById("musicContainer");
    c.innerHTML = '<div style="text-align:center; padding:50px; font-size:16px;">⚠️ Something went wrong. Please try again!</div>';
}

function showData(data) {
    let c = document.getElementById("musicContainer");
    c.innerHTML = "";
    if (!data || data.length === 0) {
        showNoResults();
        return;
    }
    
    data.forEach(song => {
        let safeTitle = song.title.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        c.innerHTML += `
        <div class="card">
            <iframe 
                width="100%" 
                height="180" 
                src="https://www.youtube.com/embed/${song.id}" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
            <p><b>${song.title.substring(0, 55)}</b></p>
            <button class="like-btn" onclick="likeSong('${song.id}', '${safeTitle}', '${song.thumbnail}', this)">❤️ Like</button>
        </div>`;
    });
}

// Camera Functions
function openCamera() {
    const modal = document.getElementById("cameraModal");
    modal.style.display = "block";
    
    navigator.mediaDevices.getUserMedia({ video: true })
        .then(function(mediaStream) {
            stream = mediaStream;
            const video = document.getElementById("video");
            video.srcObject = mediaStream;
        })
        .catch(function(err) {
            alert("Camera access denied. Using mood selector instead.");
            closeCamera();
        });
}

function closeCamera() {
    const modal = document.getElementById("cameraModal");
    modal.style.display = "none";
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    document.getElementById("moodResult").innerHTML = "";
}

function capturePhoto() {
    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const context = canvas.getContext("2d");
    
    if (!video.videoWidth || !video.videoHeight) {
        alert("Camera not ready. Please try again.");
        return;
    }
    
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0, canvas.width, canvas.height);
    
    const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
    const detectedMood = analyzeMood(imageData);
    
    document.getElementById("moodResult").innerHTML = `
        <h3>🎭 ${detectedMood.emoji} ${detectedMood.mood.toUpperCase()}</h3>
        <p style="font-size:12px">Confidence: ${detectedMood.confidence}%</p>
        <button onclick="applyMood('${detectedMood.mood}')" style="background: linear-gradient(135deg, #00c6ff, #0072ff); color: white; border: none; padding: 8px 20px; border-radius: 25px; margin-top: 8px; cursor: pointer; font-size:13px; font-weight:600;">
            🎵 Play Music
        </button>
    `;
}

function analyzeMood(imageData) {
    let r = 0, g = 0, b = 0;
    const pixels = imageData.data;
    const totalPixels = pixels.length / 4;
    
    for (let i = 0; i < pixels.length; i += 4) {
        r += pixels[i];
        g += pixels[i+1];
        b += pixels[i+2];
    }
    
    r /= totalPixels;
    g /= totalPixels;
    b /= totalPixels;
    
    if (r > 200 && g < 100 && b < 100) {
        return { mood: "angry", emoji: "😡", confidence: 88 };
    } else if (r > 200 && g > 150 && b < 100) {
        return { mood: "happy", emoji: "😊", confidence: 85 };
    } else if (r > 200 && g > 150 && b > 150) {
        return { mood: "love", emoji: "😍", confidence: 82 };
    } else if (g > 180 && r < 120 && b < 120) {
        return { mood: "relaxed", emoji: "😌", confidence: 80 };
    } else if (b > 180 && r < 100 && g < 100) {
        return { mood: "sad", emoji: "😢", confidence: 78 };
    } else if (r > 200 && g > 200 && b < 80) {
        return { mood: "excited", emoji: "🤩", confidence: 86 };
    } else if (r < 80 && g < 80 && b < 80) {
        return { mood: "sleep", emoji: "😴", confidence: 75 };
    } else {
        return { mood: "chill", emoji: "😎", confidence: 72 };
    }
}

function applyMood(mood) {
    setMood(mood);
    closeCamera();
    loadMusic();
}

// Close dropdowns when clicking outside
document.addEventListener('click', function(event) {
    if (!event.target.closest('.menu-container')) {
        document.getElementById("dropdownMenu").style.display = "none";
    }
    if (!event.target.closest('.profile-container')) {
        document.getElementById("profileMenu").style.display = "none";
    }
});

// Load initial music on page load
document.addEventListener('DOMContentLoaded', function() {
    loadMusic();
});
</script>
<script>
// ... (keep all your existing JavaScript code)
// Add this function to ensure emojis are properly set
document.addEventListener('DOMContentLoaded', function() {
    // Set emoji content for floating emojis
    const emojis = document.querySelectorAll('.emoji');
    const emojiList = ['🎵', '🎶', '🎧', '🎼', '🎹', '🎸', '🎷', '🎺', '🎻', '🥁', '🎤', '🎙️', '🎚️', '🎛️', '📀', '😊', '😢', '😡', '😌', '😍', '😴', '🤩', '📚', '😎', '💪', '💿', '📻', '🔊', '🔉', '🔈'];
    
    emojis.forEach((emoji, index) => {
        if (emojiList[index % emojiList.length]) {
            emoji.textContent = emojiList[index % emojiList.length];
        }
    });
    
    loadMusic();
});
</script>
</body>
</html>
