<!DOCTYPE html>
<html>
<head>
<title>Emotion Music Player</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: white;
    margin: 0;
    transition: 0.5s;
    background-size: 300% 300%;
    animation: gradientMove 8s ease infinite;
}

/* 🎨 Mood backgrounds */
.happy { background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb); }
.sad { background: linear-gradient(135deg, #2c3e50, #4ca1af, #6dd5ed); }
.angry { background: linear-gradient(135deg, #ff416c, #ff4b2b, #ff0000); }
.relaxed { background: linear-gradient(135deg, #1e1e2f, #2b5876, #4e4376); }
.love { background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb6c1); }
.sleep { background: linear-gradient(135deg, #141e30, #243b55, #2c5364); }
.excited { background: linear-gradient(135deg, #f7971e, #ffd200, #ff8c00); }
.focus { background: linear-gradient(135deg, #11998e, #38ef7d, #00c9ff); }
.chill { background: linear-gradient(135deg, #00c6ff, #0072ff, #6a11cb); }
.workout { background: linear-gradient(135deg, #000000, #434343, #ff512f); }

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* HEADER */
.header {
    display: grid;
    grid-template-columns: 60px 1fr auto;
    align-items: center;
    padding: 12px 20px;
    background: rgba(0,0,0,0.4);
}

/* SEARCH */
.search-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    width: 100%;
}

.header-search {
    width: 70%;
    max-width: 500px;
    padding: 10px 15px;
    border-radius: 25px;
    border: none;
    outline: none;
}

.header-search-btn {
    padding: 10px 16px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    cursor: pointer;
}

/* MENU */
.menu-container { position: relative; }

.menu-btn {
    font-size: 22px;
    cursor: pointer;
    background: none;
    border: none;
    color: white;
}

.dropdown {
    display: none;
    position: absolute;
    left: 0;
    top: 30px;
    background: rgba(0,0,0,0.9);
    border-radius: 10px;
    padding: 10px;
}

.dropdown button {
    display: block;
    width: 150px;
    margin: 5px 0;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
}

/* RIGHT BUTTONS */
.nav-buttons {
    display: flex;
    justify-content: flex-end;
    align-items: center;
}

.nav-buttons button {
    margin-left: 8px;
    padding: 6px 12px;
    border-radius: 20px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

/* MOODS */
.mood-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.mood-btn {
    padding: 10px 16px;
    border-radius: 25px;
    border: none;
    background: rgba(255,255,255,0.2);
    color: white;
    cursor: pointer;
}

/* PLAY BUTTON */
.play-btn {
    margin-top: 30px;
    padding: 12px 20px;
    border-radius: 25px;
    border: none;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    cursor: pointer;
    font-size: 16px;
}

/* CARDS */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 25px;
}

.card {
    width: 280px;
    background: white;
    color: black;
    padding: 10px;
    border-radius: 10px;
}

/* CAMERA */
#cameraSection {
    display: none;
    margin-top: 15px;
}
</style>
</head>

<body class="relaxed">

<div class="header">

    <!-- MENU -->
    <div class="menu-container">
        <button class="menu-btn" onclick="toggleMenu()">⋮</button>
        <div id="dropdownMenu" class="dropdown">
            <button onclick="aiSuggest()">🤖 AI Suggest</button>
            <button onclick="openCamera()">📷 Scan Mood</button>
            <button onclick="mostLiked()">❤️ Most Liked</button>
            <button onclick="latestSongs()">🆕 Latest Songs</button>
        </div>
    </div>

    <!-- SEARCH -->
    <div class="search-wrapper">
        <input type="text" id="searchInput" class="header-search" placeholder="Search songs..." onkeypress="handleSearch(event)">
        <button class="header-search-btn" onclick="searchMusic()">🔍</button>
    </div>

    <!-- RIGHT -->
    <div class="nav-buttons">
        <button onclick="goHome()">🏠 Home</button>
        <button onclick="goAbout()">ℹ️ About</button>
    </div>

</div>

<h1>Mood Based Music Recommendation 🎧</h1>
<h2 id="currentMoodText">😌 RELAXED</h2>

<div class="mood-container">
    <button class="mood-btn" onclick="setMood('happy')">😊 Happy</button>
    <button class="mood-btn" onclick="setMood('sad')">😢 Sad</button>
    <button class="mood-btn" onclick="setMood('angry')">😡 Angry</button>
    <button class="mood-btn" onclick="setMood('relaxed')">😌 Relaxed</button>
    <button class="mood-btn" onclick="setMood('love')">😍 Love</button>
    <button class="mood-btn" onclick="setMood('sleep')">😴 Sleep</button>
    <button class="mood-btn" onclick="setMood('excited')">🤩 Excited</button>
    <button class="mood-btn" onclick="setMood('focus')">📚 Focus</button>
    <button class="mood-btn" onclick="setMood('chill')">😎 Chill</button>
    <button class="mood-btn" onclick="setMood('workout')">💪 Workout</button>
</div>

<button class="play-btn" onclick="loadMusic()">▶ Play Mood Music</button>

<div id="cameraSection">
    <video id="video" width="280" height="180" autoplay></video>
    <br>
    <button onclick="captureMood()">📸 Capture Mood</button>
</div>

<div id="musicContainer" class="cards"></div>

<script>
let currentMood="relaxed";
let video=document.getElementById("video");

function toggleMenu(){
    let m=document.getElementById("dropdownMenu");
    m.style.display=m.style.display==="block"?"none":"block";
}

function setMood(mood){
    currentMood=mood;
    document.body.className=mood;
    document.getElementById("currentMoodText").innerText=mood.toUpperCase();
}

function goHome(){ location.href="/"; }
function goAbout(){ location.href="/about"; }

function openCamera(){
    document.getElementById("cameraSection").style.display="block";
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>video.srcObject=stream);
}

function captureMood(){
    let moods=["happy","sad","angry","relaxed"];
    let m=moods[Math.floor(Math.random()*moods.length)];
    setMood(m);
    loadMusic();
}

function searchMusic(){
    let q=document.getElementById("searchInput").value;
    fetch("/search_music?q="+q).then(r=>r.json()).then(showData);
}

function handleSearch(e){
    if(e.key==="Enter") searchMusic();
}

function loadMusic(){
    fetch("/get_music?mood="+currentMood).then(r=>r.json()).then(showData);
}

function aiSuggest(){
    let list=["lofi","romantic","sad songs","party"];
    document.getElementById("searchInput").value=list[Math.floor(Math.random()*list.length)];
    searchMusic();
}

/* NEW FEATURES */
function mostLiked(){
    document.getElementById("searchInput").value = "top trending songs";
    searchMusic();
}

function latestSongs(){
    document.getElementById("searchInput").value = "latest songs 2026";
    searchMusic();
}

function showData(data){
    let c=document.getElementById("musicContainer");
    c.innerHTML="";
    data.forEach(song=>{
        c.innerHTML+=`
        <div class="card">
        <iframe width="100%" height="180"
        src="https://www.youtube.com/embed/${song.id}"></iframe>
        <p><b>${song.title}</b></p>
        </div>`;
    });
}
</script>

</body>
</html>
