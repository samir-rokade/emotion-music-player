<!DOCTYPE html>
<html>
<head>
<title>Emotion Music Player</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: white;
    margin: 0;
    transition: 0.5s;
    background-size: 300% 300%;
    animation: gradientMove 8s ease infinite;
}

/* 🌈 GRADIENT MOODS */
.happy { background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb); }
.sad { background: linear-gradient(135deg, #2c3e50, #4ca1af, #6dd5ed); }
.angry { background: linear-gradient(135deg, #ff416c, #ff4b2b, #ff0000); }
.relaxed { background: linear-gradient(135deg, #1e1e2f, #2b5876, #4e4376); }
.love { background: linear-gradient(135deg, #ff758c, #ff7eb3, #ffb6c1); }
.sleep { background: linear-gradient(135deg, #141e30, #243b55, #2c5364); }
.excited { background: linear-gradient(135deg, #f7971e, #ffd200, #ff8c00); }
.focus { background: linear-gradient(135deg, #11998e, #38ef7d, #00c9ff); }
.chill { background: linear-gradient(135deg, #00c6ff, #0072ff, #6a11cb); }
.workout { background: linear-gradient(135deg, #000000, #434343, #ff512f); }

/* Animation */
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Mood Buttons */
.mood-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-top: 20px;
}

.mood-btn {
    padding: 12px 18px;
    border: none;
    border-radius: 25px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    background: rgba(255,255,255,0.2);
    color: white;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.mood-btn:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.35);
}

/* Play Button */
.play-btn {
    padding: 14px 30px;
    margin-top: 25px;
    border-radius: 30px;
    border: none;
    font-size: 16px;
    background: linear-gradient(135deg, #ff7e5f, #feb47b);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.play-btn:hover {
    transform: scale(1.1);
}

/* Cards */
.cards {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
}

.card {
    width: 300px;
    background: rgba(255,255,255,0.15);
    padding: 12px;
    border-radius: 15px;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}
</style>
</head>

<body class="relaxed">

<h1>🎧 Emotion Music Player</h1>

<div class="mood-container">
    <button class="mood-btn" onclick="setMood('happy')">😊 Happy</button>
    <button class="mood-btn" onclick="setMood('sad')">😢 Sad</button>
    <button class="mood-btn" onclick="setMood('angry')">😡 Angry</button>
    <button class="mood-btn" onclick="setMood('relaxed')">😌 Relaxed</button>

    <button class="mood-btn" onclick="setMood('love')">😍 Love</button>
    <button class="mood-btn" onclick="setMood('sleep')">😴 Sleep</button>
    <button class="mood-btn" onclick="setMood('excited')">🤩 Excited</button>
    <button class="mood-btn" onclick="setMood('focus')">📚 Focus</button>

    <button class="mood-btn" onclick="setMood('chill')">😎 Chill</button>
    <button class="mood-btn" onclick="setMood('workout')">💪 Workout</button>
</div>

<button class="play-btn" onclick="loadMusic()">▶ Play Music</button>

<p id="text">Select your mood</p>

<div class="cards" id="musicContainer"></div>

<script>
let currentMood = "relaxed";

function setMood(mood) {
    currentMood = mood;
    document.body.className = mood;

    const messages = {
        happy: "😊 Enjoy your happy vibes!",
        sad: "😢 Music will heal you.",
        angry: "😡 Calm down with music.",
        relaxed: "😌 Stay relaxed.",
        love: "😍 Feel the love!",
        sleep: "😴 Time to rest.",
        excited: "🤩 Let's go!",
        focus: "📚 Stay focused.",
        chill: "😎 Just chill.",
        workout: "💪 Get pumped!"
    };

    document.getElementById("text").innerText = messages[mood];
}

function loadMusic() {
    fetch("/get_music?mood=" + currentMood)
    .then(res => res.json())
    .then(data => {
        const container = document.getElementById("musicContainer");
        container.innerHTML = "";

        data.forEach(song => {
            let url = "";

            if (song.type === "video") {
                url = `https://www.youtube.com/embed/${song.id}`;
            } else {
                url = `https://www.youtube.com/embed/videoseries?list=${song.id}`;
            }

            container.innerHTML += `
                <div class="card">
                    <iframe width="100%" height="200" src="${url}" allowfullscreen></iframe>
                    <p>${song.title}</p>
                </div>
            `;
        });
    })
    .catch(err => {
        alert("Error loading music");
        console.log(err);
    });
}
</script>

</body>
</html>
