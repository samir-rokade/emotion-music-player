<!DOCTYPE html>
<html>
<head>
<title>My Profile - Emotion Music Player</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
<div class="profile-header">
    <h2 style="color: white;">🎵 Emotion Music Player</h2>
    <button class="back-btn" onclick="window.location.href='/'">← Back to Home</button>
</div>
<div class="profile-container-page">
    <div class="avatar">👤</div>
    <h2 style="text-align:center; color:#333;">{{ user.full_name }}</h2>
    <p style="text-align:center; color:#666;">@{{ user.username }}</p>
    <div class="info-item">
        <span class="label">Username:</span>
        <span class="value">{{ user.username }}</span>
    </div>
    <div class="info-item">
        <span class="label">Email:</span>
        <span class="value">{{ user.email }}</span>
    </div>
    <div class="info-item">
        <span class="label">Full Name:</span>
        <span class="value">{{ user.full_name }}</span>
    </div>
    <div class="info-item">
        <span class="label">Member Since:</span>
        <span class="value">{{ user.joined }}</span>
    </div>
</div>
</body>
</html>
